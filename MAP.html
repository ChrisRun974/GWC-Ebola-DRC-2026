function getZoneStyle(nom) {
  if (EPI[nom])          return {fillColor:'#e74c3c',fillOpacity:0.70,color:'#922b21',weight:1.2};
  if (UG_HIGH.has(nom))  return {fillColor:'#6c3483',fillOpacity:0.50,color:'#4a235a',weight:1.0};
  if (UG_MOD.has(nom))   return {fillColor:'#d2b4de',fillOpacity:0.45,color:'#7d3c98',weight:0.8};
  if (SS_ZONES.has(nom)) return {fillColor:'#e59866',fillOpacity:0.38,color:'#c0600a',weight:0.8,dashArray:'5 4'};
  const v = FLOW_RISK[nom];
  if (v) {
    if (v>=597) return {fillColor:'#1a5276',fillOpacity:0.38,color:'#154360',weight:0.7};
    if (v>=108) return {fillColor:'#2980b9',fillOpacity:0.24,color:'#1a5276',weight:0.5};
    return {fillColor:'#85c1e9',fillOpacity:0.14,color:'#2980b9',weight:0.4};
  }
  return {fillColor:'#e8e4da',fillOpacity:0.28,color:'#ccc',weight:0.3};
}

const infoPanel = L.control({position:'topright'});
infoPanel.onAdd = function() {
  this._div = L.DomUtil.create('div','info-panel');
  this._div.innerHTML = '<div class="zname">Situation map</div><div class="zprov">Hover / tap a zone</div>';
  return this._div;
};
infoPanel.addTo(map);

let geoLayer;

function makeInfo(nom, prov) {
  const d=EPI[nom], v=FLOW_RISK[nom], cb=CB_DATA[nom];
  let h=`<div class="zname">${nom}</div><div class="zprov">${prov}</div>`;
  if (d) {
    h+=`<span class="badge b-red">Affected zone</span>`;
    if(d.note) h+=`<span class="badge b-gray">${d.note}</span>`;
    h+=`<hr class="sep">`;
    h+=`<div class="stat"><span>Confirmed</span><span>${d.confirmed}</span></div>`;
    h+=`<div class="stat"><span>Suspected</span><span>${d.suspected}</span></div>`;
    h+=`<div class="stat"><span>Deaths</span><span>${d.deaths}</span></div>`;
    if(cb) h+=`<hr class="sep"><div class="stat"><span>Pax/day → Uganda</span><span>${cb.toLocaleString()}</span></div>`;
  } else if(UG_HIGH.has(nom)||UG_MOD.has(nom)) {
    h+=`<span class="badge ${UG_HIGH.has(nom)?'b-pu1':'b-pu2'}">${UG_HIGH.has(nom)?'Uganda border — high':'Uganda border — mod.'}</span>`;
    if(cb) h+=`<hr class="sep"><div class="stat"><span>Est. pax/day</span><span>${cb.toLocaleString()}</span></div><div style="font-size:10px;color:#999;margin-top:3px">Imperial College MRC GIDA</div>`;
    if(v)  h+=`<hr class="sep"><div class="stat"><span>Internal mobility flux</span><span>${v.toLocaleString()}</span></div>`;
  } else if(SS_ZONES.has(nom)) {
    h+=`<span class="badge b-ss">S. Sudan corridor</span>`;
    h+=`<hr class="sep"><div style="font-size:11px;color:#555;line-height:1.4">Border zone — geographic basis.<br>No volume data available.</div>`;
    if(v) h+=`<hr class="sep"><div class="stat"><span>Internal mobility flux</span><span>${v.toLocaleString()}</span></div>`;
  } else if(v) {
    let bc=v>=597?'b-bl3':v>=108?'b-bl2':'b-bl1';
    let bt=v>=597?'Upper tertile':v>=108?'Middle tertile':'Lower tertile';
    h+=`<span class="badge ${bc}">${bt}</span>`;
    h+=`<hr class="sep"><div class="stat"><span>Estimated inflow</span><span>${v.toLocaleString()}</span></div>`;
    h+=`<div style="font-size:10px;color:#999;margin-top:3px">Flowminder / Vodacom DRC</div>`;
  } else {
    h+=`<span class="badge b-gray">No cases reported</span>`;
  }
  return h;
}

function onEach(feature, layer) {
  const nom=feature.properties.nom, prov=feature.properties.province||'';
  layer.on({
    mouseover: function() { layer.setStyle({weight:2.5,color:'#1a1a1a'}); layer.bringToFront(); infoPanel._div.innerHTML=makeInfo(nom,prov); },
    mouseout:  function() { geoLayer.resetStyle(layer); infoPanel._div.innerHTML='<div class="zname">Situation map</div><div class="zprov">Hover / tap a zone</div>'; },
    click:     function() { infoPanel._div.innerHTML=makeInfo(nom,prov); }
  });
}

geoLayer = L.geoJSON(ZONES_GJ,{style:f=>getZoneStyle(f.properties.nom),onEachFeature:onEach}).addTo(map);

// Proportional circles — non-interactive
const BASE=35000, maxS=Math.max(...Object.values(EPI).map(d=>d.suspected));
Object.entries(CENTROIDS).forEach(([nom,ll])=>{
  const d=EPI[nom]; if(!d) return;
  const n=d.suspected||d.confirmed||1;
  L.circle(ll,{radius:BASE*Math.log(1+n)/Math.log(1+maxS),fillColor:'#e74c3c',color:'#c0392b',weight:1,fillOpacity:0.18,interactive:false}).addTo(map);
});

// Country borders
L.geoJSON(CTRY_GJ,{style:{fillOpacity:0,color:'#1c1c1c',weight:2.2,opacity:0.70,interactive:false}}).addTo(map);

// Labels
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd',maxZoom:14,opacity:0.9
}).addTo(map);

// Legend
const legend=L.control({position:'bottomleft'});
legend.onAdd=function(){
  const d=L.DomUtil.create('div','legend');
  d.innerHTML=`
    <h4>Affected zones</h4>
    <div><svg width="20" height="12" style="vertical-align:middle;margin-right:5px"><circle cx="6" cy="6" r="5" fill="#e74c3c" fill-opacity="0.18" stroke="#c0392b" stroke-width="1"/><circle cx="15" cy="6" r="3" fill="#e74c3c" fill-opacity="0.18" stroke="#c0392b" stroke-width="1"/></svg>Circle ∝ log(suspected cases)</div>
    <h4>Propagation risk · Flowminder</h4>
    <div><span class="sq" style="background:#1a5276"></span>Upper tertile</div>
    <div><span class="sq" style="background:#2980b9;opacity:0.85"></span>Middle tertile</div>
    <div><span class="sq" style="background:#85c1e9;opacity:0.85"></span>Lower tertile</div>
    <h4>Cross-border corridors</h4>
    <div><span class="sq" style="background:#6c3483"></span>Uganda &gt;500 pax/day</div>
    <div><span class="sq" style="background:#d2b4de"></span>Uganda &lt;500 pax/day</div>
    <div><span class="sq-dash"></span>S. Sudan — no data</div>
    <div style="margin-top:7px;border-top:0.5px solid #eee;padding-top:6px;font-size:9.5px;color:#bbb;line-height:1.5">
      INSP SitRep 007 · 23 May 2026<br>WHO SitRep 01 · 18 May 2026<br>
      Flowminder/Vodacom · Imperial College<br>
      Basemap: OSM / HDX-OCHA · CC BY 4.0
    </div>`;
  return d;
};
legend.addTo(map);
</script>
</body>
</html>
